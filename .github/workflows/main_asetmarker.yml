name: Build Desktop Executables

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax smoke-check
        run: python -m compileall desktop src main_gui.py

  build-desktop:
    needs: tests
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --noconfirm --clean build/asetmarker-windows.spec

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --noconfirm --clean build/asetmarker-macos.spec

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asetmarker-${{ runner.os }}
          path: dist/**
          